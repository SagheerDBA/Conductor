# Agent Definition Schema
# Copy this file to AgentLibrary/Work/agents/<slug>/definition.yaml
# or AgentLibrary/Personal/agents/<slug>/definition.yaml

name: agent-slug                  # kebab-case, matches folder name
display_name: AgentDisplayName    # shown in the UI
version: v1.0
build: "001"
status: Production                # Production | Development
category: Work                    # Work | Personal
created: YYYY-MM-DD
last_updated: YYYY-MM-DD
author: your-username

domain: >
  One-line description of the agent's domain.

description: >
  2-3 sentences: what this agent knows, what problems it solves, how it fits
  into a multi-agent workflow.

system_prompt: |
  You are the [AgentName] -- [role description].

  Your expertise covers:
  - [key area 1]
  - [key area 2]

  When given a task, respond with:
  - [expected output format]

  Stay in your role. You are a specialist, not a general assistant.

tools: []

boundaries:
  does:
    - Specific capability 1
    - Specific capability 2
  does_not:
    - Explicit exclusion 1
    - Explicit exclusion 2

example_use_cases:
  - Scenario where the Conductor should route to this agent

tags:
  - relevant-tag-1
  - relevant-tag-2
